<div class="grid gap-6 md:grid-cols-2">
  <div class="space-y-2">
    <label class="block text-sm font-medium text-slate-900">사원번호</label>
    <input id="user-detail-id" type="text" value="{{ selected_user.user_id }}" readonly class="w-full rounded-lg border border-slate-200 bg-slate-100 px-4 py-2.5 text-sm text-slate-900">
  </div>

  <div class="space-y-2">
    <label class="block text-sm font-medium text-slate-900">이름</label>
    <input id="user-detail-name" type="text" value="{{ selected_user.name }}" class="w-full rounded-lg border border-slate-200 bg-white px-4 py-2.5 text-sm text-slate-900">
  </div>

  <div class="space-y-2">
    <label class="block text-sm font-medium text-slate-900">부서</label>
    <input id="user-detail-department" type="text" value="{{ selected_user.department|default:'' }}" class="w-full rounded-lg border border-slate-200 bg-white px-4 py-2.5 text-sm text-slate-900">
  </div>

  <div class="space-y-2">
    <label class="block text-sm font-medium text-slate-900">직급</label>
    <input id="user-detail-position" type="text" value="{{ selected_user.position|default:'' }}" class="w-full rounded-lg border border-slate-200 bg-white px-4 py-2.5 text-sm text-slate-900">
  </div>

  <div class="space-y-2">
    <label class="block text-sm font-medium text-slate-900">비밀번호</label>
    <input type="text" value="임시 비밀번호로 초기화" class="w-full rounded-lg border border-slate-200 bg-white px-4 py-2.5 text-sm text-slate-400">
  </div>

  <div class="space-y-2">
    <label class="block text-sm font-medium text-slate-900">활성화 여부</label>
    <select id="user-detail-active" class="rounded-lg border border-slate-200 bg-white px-4 py-2.5 text-sm text-slate-900">
      <option value="Y" {% if selected_user.use_yn == "Y" %}selected{% endif %}>사용</option>
      <option value="N" {% if selected_user.use_yn == "N" %}selected{% endif %}>비활성</option>
    </select>
  </div>

  <div class="space-y-2">
    <label class="block text-sm font-medium text-slate-900">등록일자</label>
    <input type="text" value="{{ selected_user.created_at|default:'YYYY-MM-DD HH24:MI:SE' }}" readonly class="w-full rounded-lg border border-slate-200 bg-slate-100 px-4 py-2.5 text-sm text-slate-900">
  </div>

  <div class="space-y-2">
    <label class="block text-sm font-medium text-slate-900">임시 비밀번호 수정여부</label>
    <input type="text" value="수정" readonly class="w-full rounded-lg border border-slate-200 bg-slate-100 px-4 py-2.5 text-sm text-slate-900">
  </div>

  <div class="space-y-2">
    <label class="block text-sm font-medium text-slate-900">마지막 로그인 일자</label>
    <input type="text" value="YYYY-MM-DD HH24:MI:SE" readonly class="w-full rounded-lg border border-slate-200 bg-slate-100 px-4 py-2.5 text-sm text-slate-900">
  </div>
</div>

<div class="mt-6">
  <div class="mb-3 flex items-center justify-between">
    <h4 class="text-sm font-semibold text-slate-900">소속 프로젝트</h4>
  </div>
  <div class="max-h-56 overflow-y-auto rounded-2xl bg-slate-100 p-4">
    <div class="space-y-3">
      {% for role in user_roles %}
        <div class="flex items-center justify-between rounded-xl bg-white px-4 py-3 shadow-sm">
          <div>
            <p class="text-sm font-medium text-slate-900">{{ role.project.name }}</p>
            <p class="mt-1 text-xs text-slate-500">{{ role.role.code|default:role.role }}</p>
          </div>
          <span class="rounded-lg bg-slate-100 px-3 py-1 text-xs font-medium text-slate-600">연결됨</span>
        </div>
      {% empty %}
        <div class="rounded-xl bg-white px-4 py-3 text-sm text-slate-500">소속 프로젝트가 없습니다.</div>
      {% endfor %}
    </div>
  </div>
</div>

<div class="mt-8 flex items-center justify-end gap-3">
  <button type="button" class="rounded-lg bg-red-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-red-700">
    사용자 삭제
  </button>
  <button type="button" class="rounded-lg bg-blue-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700">
    사용자 수정
  </button>
</div>
