<aside data-sidebar-panel class="border-b border-slate-200 bg-white lg:fixed lg:inset-y-0 lg:left-0 lg:z-40 lg:w-64 lg:border-b-0 lg:border-r">
  <div class="flex h-full flex-col">
    <div class="flex h-16 items-center gap-3 border-b border-slate-200 px-4">
      <div class="flex h-10 w-10 items-center justify-center rounded-full border border-slate-300 bg-slate-50 text-sm font-bold text-slate-700">
        A
      </div>
      <div>
        <p class="text-xs font-medium uppercase tracking-[0.2em] text-slate-400">ALPLED</p>
        <p class="text-sm font-semibold text-slate-900">Admin Console</p>
      </div>
    </div>

    <nav class="flex-1 space-y-2 px-3 py-4">
      <a href="{% url 'user_list' %}" class="flex items-center gap-3 rounded-xl border px-4 py-3 text-sm font-medium transition
        {% if active_menu == 'users' %}border-blue-200 bg-blue-50 text-blue-700{% else %}border-slate-200 bg-white text-slate-700 hover:bg-slate-50{% endif %}">
        <svg class="h-5 w-5" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M10 10.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" stroke="currentColor" stroke-width="1.6"/>
          <path d="M4 16.5c0-2.8 2.7-4.5 6-4.5s6 1.7 6 4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <span>사용자 관리</span>
      </a>
      <a href="{% url 'project_list' %}" class="flex items-center gap-3 rounded-xl border px-4 py-3 text-sm font-medium transition
        {% if active_menu == 'projects' %}border-blue-200 bg-blue-50 text-blue-700{% else %}border-slate-200 bg-white text-slate-700 hover:bg-slate-50{% endif %}">
        <svg class="h-5 w-5" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M3.5 6.5a2 2 0 0 1 2-2h2l1.8 1.8h7.2a2 2 0 0 1 2 2v6.2a2 2 0 0 1-2 2h-11a2 2 0 0 1-2-2v-8Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        </svg>
        <span>프로젝트 관리</span>
      </a>
      <button type="button" class="flex w-full items-center justify-between rounded-xl border border-slate-200 bg-white px-4 py-3 text-left text-sm font-medium text-slate-700 hover:bg-slate-50">
        <span class="flex items-center gap-3">
          <svg class="h-5 w-5" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M3.5 7.2h5l1.3 1.5h6.7v6.8a1.5 1.5 0 0 1-1.5 1.5h-10A1.5 1.5 0 0 1 3.5 15.5V7.2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M3.5 7.2V5.5A1.5 1.5 0 0 1 5 4h4.2l1.3 1.5H16a1.5 1.5 0 0 1 1.5 1.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <span>프로젝트 선택</span>
        </span>
        <span class="text-lg leading-none">▾</span>
      </button>
    </nav>

    <div class="border-t border-slate-200 p-4">
      <div class="flex items-center justify-between">
        <span class="text-sm font-semibold text-slate-900">{% firstof request.user.username "admin" %}</span>
        <button type="button" class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-700">
          Logout
        </button>
      </div>
    </div>
  </div>
</aside>
