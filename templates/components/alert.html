{% with level=message.tags|default:"info" %}
  <div class="rounded-lg border px-4 py-3 text-sm shadow-sm
    {% if level == 'success' %}border-emerald-200 bg-emerald-50 text-emerald-800
    {% elif level == 'error' %}border-red-200 bg-red-50 text-red-800
    {% elif level == 'warning' %}border-amber-200 bg-amber-50 text-amber-800
    {% else %}border-blue-200 bg-blue-50 text-blue-800{% endif %}">
    {{ message }}
  </div>
{% endwith %}
